<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🐝 HIVE 競馬AI</title><meta property="og:title" content="🐝 HIVE 競馬AI予想"><meta property="og:description" content="レースの蜜を集める競馬AI｜BT回収率182.0%"><meta property="og:image" content="https://reji-ai-lab.github.io/keiba-ai/ogp.png"><meta property="og:type" content="website"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:image" content="https://reji-ai-lab.github.io/keiba-ai/ogp.png"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f4f6f8;font-family:sans-serif}#gate{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.gb{background:#fff;border-radius:12px;padding:30px;max-width:360px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08)}.gb h2{color:#0d1b2a;font-size:18px;margin-bottom:8px}.gb p{color:#8899aa;font-size:12px;margin-bottom:20px}.gb input{width:100%;padding:12px;border:1px solid #dfe6ec;border-radius:8px;font-size:14px;margin-bottom:12px;text-align:center}.gb button{width:100%;padding:12px;background:#00866e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}.gb button:hover{background:#006d5a}.gb .err{color:#e74c3c;font-size:11px;margin-top:8px;display:none}</style></head><body><div id="gate"><div class="gb"><h2>🐝 HIVE 🐝</h2><p>レースの蜜を集める競馬AI</p><p style="color:#b0bec5;font-size:11px;margin-bottom:16px">noteで購入したパスワードを入力してください</p><input type="password" id="pw" placeholder="パスワード" onkeypress="if(event.key==='Enter')check()"><button onclick="check()">予想を表示する</button><div class="err" id="err">パスワードが違います</div></div></div><script>var D="";var H=65561143;function b64u(b){var r=atob(b);var a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return new TextDecoder('utf-8').decode(a)}function unlock(){try{sessionStorage.setItem('hive_auth',H)}catch(e){}document.open();document.write(b64u(D));document.close()}function check(){var p=document.getElementById('pw').value;var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}if(h===H){unlock();}else{document.getElementById('err').style.display='block';}}try{if(parseInt(sessionStorage.getItem('hive_auth'))===H){unlock();}}catch(e){}</script></body></html>
