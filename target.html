<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>🐝 補正タイム指数</title><style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#eef0f3;font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px;color:#1a1a2e}
.topbar{background:#0d1b2a;color:#fff;padding:10px 14px;position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px}
.topbar h1{font-size:14px;font-weight:700;flex:1}
.topbar .ts{font-size:10px;color:#8899aa}
.rcard{background:#fff;margin:8px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.race-head{background:#0d1b2a;color:#fff;padding:8px 12px;font-size:13px}
.rtag{background:#00866e;color:#fff;border-radius:3px;padding:1px 6px;font-size:11px;margin-right:4px}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:max-content;min-width:100%}
thead tr{background:#f0f4f8}
th{padding:5px 8px;font-size:10px;color:#667;font-weight:600;white-space:nowrap;border-bottom:2px solid #dde3ea;text-align:center}
td{padding:4px 6px;border-bottom:1px solid #eef;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f0f4f8 !important}
.cn{min-width:120px;position:sticky;left:0;background:#fff;z-index:5;border-right:2px solid #c8d4e0;padding:4px 8px}
thead .cn{background:#f0f4f8;border-right:2px solid #c0ccd8}
.cn-top{display:flex;align-items:center;gap:4px}
.cn-sub{font-size:10px;color:#778;margin-top:2px;padding-left:2px;white-space:nowrap}
.ub{display:inline-block;background:#334;color:#fff;border-radius:3px;padding:1px 4px;font-size:10px;font-weight:700;min-width:18px;text-align:center;flex-shrink:0}
.nm{font-size:12px;color:#222;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.ch{text-align:center;min-width:50px;padding:4px 5px}
.track{font-size:9px;color:#555;margin-bottom:2px;letter-spacing:-0.3px;font-weight:600}
.pidx{font-size:15px;font-weight:700}</style></head><body><div class="topbar"><h1>🐝 補正タイム指数</h1><span class="ts">更新 05/04 00:53</span></div></body></html>
